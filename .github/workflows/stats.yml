name: Actualizar Estadísticas de Lenguajes

on:
  # Ejecutar automáticamente en cada push a main
  push:
    branches: [ main ]
  # Ejecutar diariamente a las 00:00 UTC
  schedule:
    - cron: '0 0 * * *'
  # Permitir ejecución manual
  workflow_dispatch:

jobs:
  actualizar-estadisticas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install requests
      
      - name: Ejecutar script de estadísticas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python stats.py
      
      - name: Commit y push de estadísticas
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add estadisticas_lenguajes.json README.md 2>/dev/null || true
          git commit -m "📊 Actualizar estadísticas de lenguajes [skip ci]" || echo "No hay cambios"
          git push
